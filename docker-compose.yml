services:
  app:
    build: .
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      # Local SQLite, persisted via the ./data volume below — the simplest
      # option for a self-hosted internal server. To use Turso instead,
      # delete this line and set TURSO_DATABASE_URL below to your libsql:// URL.
      TURSO_DATABASE_URL: file:/app/data/pos.db
      # Only read if TURSO_DATABASE_URL above is switched to a real Turso URL;
      # harmless no-op otherwise. Substituted directly (not via `env_file:`) so
      # this works whether the var comes from a local .env (docker compose CLI
      # auto-loads one from the project dir) or from a UI-managed deployment
      # tool like Portainer, which injects stack env vars into the compose
      # process rather than writing a literal .env file into the stack folder.
      TURSO_AUTH_TOKEN: ${TURSO_AUTH_TOKEN:-}
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    expose:
      - "3001"
    # No `ports:` mapping — the app is only reachable through the cloudflared
    # tunnel below, not directly from the host network.

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN}
    depends_on:
      - app
